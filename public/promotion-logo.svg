<svg width="250" height="70" viewBox="0 0 250 70" xmlns="http://www.w3.org/2000/svg">
  <!-- Piggy Bank -->
  <g>
    <!-- Pig Body -->
    <path d="M 12 35 Q 12 15 35 15 L 50 15 Q 70 15 70 35 Q 70 55 50 55 L 35 55 Q 12 55 12 35 Z" fill="#F48FB1" stroke="#000000" stroke-width="2"/>
    <!-- Snout -->
    <path d="M 5 30 L 12 25 L 12 45 L 5 40 Z" fill="#F48FB1" stroke="#000000" stroke-width="2"/>
    <!-- Ear -->
    <path d="M 30 15 Q 25 5 20 15 Z" fill="#F48FB1" stroke="#000000" stroke-width="2"/>
    <!-- Eye -->
    <circle cx="25" cy="30" r="3" fill="#000000"/>
    <!-- Legs -->
    <rect x="25" y="55" width="10" height="7" fill="#F48FB1" stroke="#000000" stroke-width="2"/>
    <rect x="50" y="55" width="10" height="7" fill="#F48FB1" stroke="#000000" stroke-width="2"/>
    <!-- Tail -->
    <path d="M 70 35 Q 80 35 80 25 Q 80 15 70 15 Q 60 15 60 25" stroke="#000000" stroke-width="2" fill="none"/>
    <!-- Coin -->
    <circle cx="45" cy="10" r="9" fill="#FFD54F" stroke="#000000" stroke-width="2"/>
    <text x="45" y="14" text-anchor="middle" font-size="14" font-weight="bold" fill="#000000">$</text>
    <!-- Coin slot -->
    <rect x="35" y="18" width="20" height="3" rx="1.5" fill="#000000"/>
  </g>
  <!-- Text -->
  <text x="95" y="25" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000000">Nuôi Heo</text>
  <text x="95" y="50" font-family="Arial, sans-serif" font-size="16" fill="#000000">365</text>
</svg>